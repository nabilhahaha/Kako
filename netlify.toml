# This branch's preview builds the Roshen Next.js app (roshen/), not the
# root Vite "Trade Spend" app.
#
# IMPORTANT: do NOT set `publish` manually for Next.js — the official
# @netlify/plugin-nextjs configures the publish dir + serverless runtime.
# Setting publish=".next" publishes the raw build with no runtime → 404.
[build]
  base = "roshen"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

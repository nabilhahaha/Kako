<!doctype html>
<!--
  Minimal static shell for `frontendDist`.

  This is the ONLY thing Tauri bundles as web assets. The real UI is the Next.js
  app served by the local node sidecar (Offline → http://127.0.0.1:54331) or the
  hosted app (Online → the cloud URL); the window's `url` in tauri.conf.json
  points there, so this file is just the required-by-Tauri asset + a brief splash
  shown until the window navigates. It is intentionally dependency-free and
  contains NO node_modules — pointing frontendDist at `.next/standalone` (a Node
  server dir that bundles node_modules) is what the Tauri bundler rejects.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VANTORA</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        height: 100%; margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0b1220; color: #e2e8f0;
      }
      .wrap {
        height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1.25rem;
      }
      .mark { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.18em; }
      .spinner {
        width: 28px; height: 28px; border-radius: 50%;
        border: 3px solid rgba(148, 163, 184, 0.25);
        border-top-color: #38bdf8;
        animation: spin 0.8s linear infinite;
      }
      .hint { font-size: 0.8rem; color: #94a3b8; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
    </style>
  </head>
  <body>
    <div class="wrap" role="status" aria-live="polite">
      <div class="mark">VANTORA</div>
      <div class="spinner" aria-hidden="true"></div>
      <div class="hint">Starting…</div>
    </div>
  </body>
</html>

name: Deploy Edge Functions

on:
  # Manual trigger from the Actions tab.
  workflow_dispatch:
    inputs:
      functions:
        description: 'Comma-separated function names (blank = all)'
        required: false
        default: ''
  # Auto-deploy when any function code changes on a release branch.
  push:
    branches:
      - main
      - 'claude/build-expiry-registration-app-en17Q'
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest

    # Required: set SUPABASE_ACCESS_TOKEN in Settings → Secrets and variables → Actions.
    # Create one at https://supabase.com/dashboard/account/tokens
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: njgjrktszvogivhbplbn

    steps:
      - uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify access token is set
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not configured. Add one at Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Deploy functions
        run: |
          set -e
          REQUESTED="${{ github.event.inputs.functions }}"
          ALL_FUNCTIONS="admin-create-user admin-update-user admin-delete-user admin-reset-password send-decision-email"
          if [ -z "$REQUESTED" ]; then
            FUNCTIONS="$ALL_FUNCTIONS"
          else
            FUNCTIONS=$(echo "$REQUESTED" | tr ',' ' ')
          fi
          for fn in $FUNCTIONS; do
            echo "::group::Deploying $fn"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF"
            echo "::endgroup::"
          done
          echo "::notice::Deployed: $FUNCTIONS"

name: E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: Playwright smoke (no DB)
    runs-on: ubuntu-latest
    # Boot the app with placeholder Supabase values so public pages, i18n and
    # the auth-gate redirect render without a real backend. The authenticated
    # spec self-skips because no E2E_* credentials are provided here.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Build separately so the Playwright webServer only has to `next start`
      # (ready in <1s). The full production build takes minutes and would
      # otherwise exceed the webServer readiness timeout.
      - name: Build app
        run: npm run build

      - name: Run E2E smoke suite
        env:
          PW_E2E_START_ONLY: '1'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
